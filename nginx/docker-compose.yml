services:
  nginx:
      build: 
        context: .
        dockerfile: Dockerfile.dev
      healthcheck:
        test: ["CMD", "wget", "-qO-", "http://localhost"]
        interval: 10s
        timeout: 5s
        retries: 3
      ports:
        - "80:80"
        - "443:443"
      volumes:
        - ./nginx.conf:/etc/nginx/nginx.conf:ro
        - ./certs:/etc/nginx/certs:ro
        - ./html:/usr/share/nginx/html:ro
      #depends_on:
        # - legal-api
        # - documento-api
        # - cliente-api
        # - profissional-api
      networks:
        - public
        - private


networks:
  public:
  private: