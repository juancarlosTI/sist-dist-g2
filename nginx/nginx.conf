events {}

http {
    client_max_body_size 50M;

    server_tokens off;

    # cache de auth (curto e seguro)
    proxy_cache_path /tmp/nginx_auth levels=1:2 keys_zone=auth_cache:10m max_size=100m;

    upstream auth-service {
        server auth-service-api:10050;
    }

    # upstream legal {
    #     server legal-api:10001;
    # }

    upstream documento {
        server documento-api:10051;
    }

    # upstream cliente {
    #     server cliente-api:8080;
    # }

    # upstream profissional {
    #     server profissional-api:8080;
    # }

    server {
        listen 80;
        server_name _;

        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2;

        location = /health {
            access_log off;
            return 200 'ok';
            add_header Content-Type text/plain;
        }

        server_name _;

        # Diffie-Hellman parameter for DHE ciphersuites
        ssl_ecdh_curve X25519:secp384r1;

        # Self-signed HTTPS
        ssl_certificate /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;
        
        # Somente protocolos modernos
        ssl_protocols TLSv1.2 TLSv1.3;
        
        ssl_ciphers "ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305";
        
        # Session cache
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_session_tickets off;

        # Cyphers
        ssl_prefer_server_ciphers on;
        
        # Headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # =====================================================
        # CORS CENTRALIZADO
        # =====================================================

        # Frontend Vite local
        set $cors_origin "";

        if ($http_origin ~* "^https?://(localhost|127\.0\.0\.1)(:[0-9]+)?$") {
            set $cors_origin $http_origin;
        }

        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Origin, X-Requested-With" always;
        add_header Access-Control-Expose-Headers "Authorization" always;

        

        # # CSP
        # add_header Content-Security-Policy "
        # default-src 'self';
        # script-src 'self';
        # style-src 'self';
        # img-src 'self' data:;
        # connect-src 'self';
        # frame-ancestors 'none';
        # object-src 'none';
        # base-uri 'self';
        # form-action 'self';
        # ";

        # location = /api/v1/legal {
        #     root /usr/share/nginx/html;
        #     index legal.html;
        # }

        # location = /api/v1/documento/health {
        #     proxy_pass http://documento/api/v1/health;
        #     proxy_set_header Host $host;
        #     proxy_set_header X-Real-IP $remote_addr;
        # }

        # location /api/v1/legal/swagger/ {
        #     proxy_pass http://legal/swagger/;

        #     sub_filter_once off;
        #     sub_filter_types text/html application/javascript;
        #     sub_filter '"/swagger/' '"/api/v1/legal/swagger/';
        # }

        # =============================
        # 📘 SWAGGER AUTH
        # =============================

        location = /api/v1/auth-service/swagger {
            return 301 /api/v1/auth-service/swagger/;
        }

        location /api/v1/auth-service/swagger/ {
            proxy_pass http://auth-service/swagger/;

            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Prefix /api/v1/auth-service;

            proxy_redirect /swagger/ /api/v1/auth-service/swagger/;

            sub_filter_once off;
            sub_filter_types text/html application/javascript;

            sub_filter 'href="/swagger/' 'href="/api/v1/auth-service/swagger/';
            sub_filter 'src="/swagger/' 'src="/api/v1/auth-service/swagger/';
            sub_filter 'url: "/swagger/doc.json"' 'url: "/api/v1/auth-service/swagger/doc.json"';
        }

        # =============================
        # AUTH SERVICE PUBLIC ROUTES
        # =============================

        location /api/v1/auth-service/ {

            if ($request_method = OPTIONS) {
                return 204;
            }

            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Origin, X-Requested-With" always;

            proxy_pass http://auth-service/;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_set_header X-Forwarded-Prefix /api/v1/auth-service;
        }

        # =============================
        # 📘 SWAGGER LEGAL
        # =============================

        # location = /api/v1/legal/swagger {
        #     return 301 /api/v1/legal/swagger/;
        # }

        # location /api/v1/legal/swagger/ {
        #     proxy_pass http://legal/swagger/;

        #     proxy_set_header Host $host;
        #     proxy_set_header X-Real-IP $remote_addr;
        #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        #     proxy_set_header X-Forwarded-Proto $scheme;
        #     proxy_set_header X-Forwarded-Prefix /api/v1/legal;

        #     proxy_redirect /swagger/ /api/v1/legal/swagger/;

        #     sub_filter_once off;
        #     sub_filter_types text/html application/javascript;
            
        #     sub_filter 'href="/swagger/' 'href="/api/v1/legal/swagger/';
        #     sub_filter 'src="/swagger/' 'src="/api/v1/legal/swagger/';
        #     sub_filter 'url: "/swagger/doc.json"' 'url: "/api/v1/legal/swagger/doc.json"';
        # }
        
        # =============================
        # 📘 SWAGGER DOCUMENTO
        # =============================

        location = /api/v1/documento/swagger {
            return 301 /api/v1/documento/swagger/;
        }

        location /api/v1/documento/swagger/ {

            proxy_pass http://documento/swagger/;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Prefix /api/v1/documento;

            proxy_redirect /swagger/ /api/v1/documento/swagger/;

            sub_filter_once off;
            sub_filter_types text/html application/javascript;

            sub_filter 'href="/swagger/' 'href="/api/v1/documento/swagger/';
            sub_filter 'src="/swagger/' 'src="/api/v1/documento/swagger/';
            sub_filter 'url: "/swagger/doc.json"' 'url: "/api/v1/documento/swagger/doc.json"';
        }

        # =============================
        # AUTH INTERNAL VALIDATION
        # =============================

        location = /_auth {
            internal;

            proxy_pass http://auth-service/auth/validate;

            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Original-URI $request_uri;

            proxy_pass_request_body off;
            proxy_set_header Content-Length "";

            # cache curto (opcional)
            proxy_cache auth_cache;
            proxy_cache_valid 200 30s;
        }

        # =============================
        # 🔒 LEGAL SERVICE
        # =============================

        # location /api/v1/legal/ {

        #     if ($request_method = OPTIONS) {
        #         return 204;
        #     }

        #     add_header Access-Control-Allow-Origin $cors_origin always;
        #     add_header Access-Control-Allow-Credentials "true" always;
        #     add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        #     add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Origin, X-Requested-With" always;

        #     auth_request /_auth;

        #     auth_request_set $user_id $upstream_http_x_user_id;
        #     auth_request_set $user_role $upstream_http_x_user_role;
        #     auth_request_set $user_canal $upstream_http_x_user_canal;
        #     auth_request_set $user_sistema $upstream_http_x_user_sistema;

        #     proxy_set_header X-User-ID $user_id;
        #     proxy_set_header X-User-Role $user_role;
        #     proxy_set_header X-User-Canal $user_canal;
        #     proxy_set_header X-User-Sistema $user_sistema;

        #     proxy_set_header Authorization $http_authorization;

        #     proxy_pass http://legal/;
        # }

        # =============================
        # 🔒 DOCUMENTO SERVICE
        # =============================

        location /api/v1/documento/ {

            if ($request_method = OPTIONS) {
                return 204;
            }

            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Origin, X-Requested-With" always;

            auth_request /_auth;

            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $user_role $upstream_http_x_user_role;
            auth_request_set $user_canal $upstream_http_x_user_canal;
            auth_request_set $user_sistema $upstream_http_x_user_sistema;

            proxy_set_header X-User-ID $user_id;
            proxy_set_header X-User-Role $user_role;
            proxy_set_header X-User-Canal $user_canal;
            proxy_set_header X-User-Sistema $user_sistema;

            proxy_set_header Authorization $http_authorization;

            proxy_pass http://documento/;
        }

        # =============================
        # FRONTEND
        # =============================

        location / {

            root /usr/share/nginx/html;
            index teste.html;

        #     proxy_pass http://localhost:8080;
        #     proxy_set_header Host $host;
        #     proxy_set_header X-Real-IP $remote_addr;
        #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        #     proxy_set_header X-Forwarded-Proto $scheme;
        }

        # location /api/documento/ {
        #     proxy_pass http://documento/;
        # }

        # location /api/cliente/ {
        #     proxy_pass http://cliente/;
        # }

        # location /api/profissional/ {
        #     proxy_pass http://profissional/;
        # }
    }
}